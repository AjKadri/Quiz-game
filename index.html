<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
\        <h1 id="level">15 Quiz Questions to Pick Your Brains</h1>
        <p class="instruction">Click the button below to start</p>
        <div id="question-container">
            <div id="question">Question Text</div>
            <div id="answer-buttons" class="btn-grid">
                <!-- Answer buttons will be generated here -->
            </div>
            <div id="results"></div>
        </div>
        <button id="start-btn" class="start-btn btn">Start Quiz</button>

        <button id="retry-btn" class="start-btn btn"><img src="Images/retry-svgrepo-com.svg" height="20px"/> Retry</button>
    </div>

    <footer>
        Made by <a href="https://github.com/AjKadri">AJ</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
